<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Terminal Exocharts — photo perfect v2</title>
<style>
:root{
  --shell-radius:14px;
  --chrome:#15191d;
  --chrome2:#11161a;
  --bg:#090d13;
  --panel:#0a0e14;
  --panel2:#0f151b;
  --grid:#26303a;
  --line:#1e2730;
  --muted:#7f8b95;
  --text:#c8d0d6;
  --text2:#a9b3bb;
  --green:#48d284;
  --green2:#2fb86d;
  --red:#d35b66;
  --red2:#bd4652;
  --blue:#1f4f82;
  --blue2:#2b77b5;
  --yellow:#d9d241;
  --orange:#d7953e;
  --row:15px;
  --top:25px;
  --tab:24px;
  --bottom:24px;
  --tools:30px;
  --dom:292px;
  --font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:var(--font);font-size:11px;font-variant-numeric:tabular-nums;color:var(--text);background:linear-gradient(130deg,#5b44fa 0%,#9239d2 38%,#c22db8 68%,#ff1484 100%);-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}
.terminal{position:fixed;inset:10px 11px 12px 11px;display:grid;grid-template-rows:var(--top) 1fr var(--bottom);background:var(--bg);border:1px solid rgba(255,255,255,.05);border-radius:var(--shell-radius);overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.05)}
.topbar{height:var(--top);display:flex;align-items:center;background:#15191d;border-bottom:1px solid rgba(255,255,255,.075);color:#cdd3d8;white-space:nowrap;overflow:hidden;line-height:var(--top)}
.top-item{height:100%;display:inline-flex;align-items:center;padding:0 10px;border-right:1px solid rgba(255,255,255,.055);gap:7px}
.market{font-weight:650;color:#d5dde3;padding-left:15px;font-size:12px;letter-spacing:.01em}
.market:after{content:'›';opacity:.9;font-size:16px;margin-left:3px;transform:translateY(-1px)}
.tf{font-weight:700;color:#d9dee3;min-width:42px;justify-content:center;cursor:pointer}
.tf.active{background:#1b2025;color:#fff;box-shadow:inset 0 -2px 0 #2b78b7}
.icon-code{font-weight:800;font-size:15px;color:#eef2f5;letter-spacing:-.08em;transform:translateY(-1px)}
.stack{width:16px;height:16px;position:relative;display:inline-block}.stack:before,.stack:after{content:'';position:absolute;left:2px;right:2px;height:6px;border:1px solid #cfd6dc;transform:skewY(-25deg)}.stack:before{top:2px;background:#d9e0e5}.stack:after{bottom:2px;background:transparent}
.grid-ico{width:13px;height:13px;display:grid;grid-template-columns:repeat(2,1fr);gap:2px}.grid-ico i{background:#d4d9dd;border-radius:1px}
.camera{width:15px;height:11px;border-radius:2px;background:#dbe1e5;display:inline-block;position:relative}.camera:after{content:'';position:absolute;width:5px;height:5px;border-radius:50%;background:#1a1f23;left:5px;top:3px}.camera:before{content:'';position:absolute;width:5px;height:2px;background:#dbe1e5;left:2px;top:-2px;border-radius:1px 1px 0 0}
.spacer{flex:1}.clock{padding-right:16px;color:#d0d5da;font-weight:500;font-size:12px}.close-x{font-size:17px;color:#a9b0b5;padding:0 10px}.muted{color:#89949d}.view{cursor:pointer}.view:hover{background:#1a2025}.view.active{background:#1a2025;color:#fff}
.workspace{min-height:0;display:grid;grid-template-columns:1fr var(--dom);background:#080c12}.workspace.no-dom{grid-template-columns:1fr}.workspace.tpo{grid-template-columns:1fr}.chart-pane{min-width:0;position:relative;background:#080c12;border-right:1px solid rgba(137,168,196,.13);overflow:hidden}.left-tools{position:absolute;left:0;top:0;bottom:0;width:var(--tools);background:#11181e;border-right:1px solid rgba(255,255,255,.055);z-index:5;display:flex;flex-direction:column;align-items:center}.tool{height:28px;width:100%;display:grid;place-items:center;color:#b8c2ca;opacity:.9;border-bottom:1px solid rgba(255,255,255,.025)}.tool:first-child{background:#1a2229}.tool.down{margin-top:auto;border-top:1px solid rgba(255,255,255,.045)}.tool svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.65;stroke-linecap:round;stroke-linejoin:round}.chart-tabs{position:absolute;left:var(--tools);right:0;top:0;height:var(--tab);background:#11171d;border-bottom:1px solid rgba(255,255,255,.06);z-index:6;display:flex;align-items:center;color:#c7d0d7}.tab-title{height:100%;display:inline-flex;align-items:center;padding:0 12px;border-right:1px solid rgba(255,255,255,.045);font-weight:600}.tab-title .x{font-size:15px;margin-left:8px;color:#abb4bb}.shot-tip{position:absolute;top:0;left:510px;height:36px;padding:0 13px;display:flex;align-items:center;background:#1a2025;border:1px solid rgba(255,255,255,.05);color:#c8ced3;box-shadow:0 2px 0 rgba(0,0,0,.18);z-index:7}.chart-icons{position:absolute;top:64px;left:50%;transform:translateX(-50%);height:40px;background:#13191f;border:1px solid rgba(146,165,181,.25);display:none;align-items:center;z-index:10}.chart-icons.on{display:flex}.chart-icons span{width:33px;height:38px;display:grid;place-items:center;border-right:1px solid rgba(255,255,255,.09);font-size:15px;color:#dce3e9}.chart-icons span:last-child{border-right:0}.stage{position:absolute;left:var(--tools);right:0;top:var(--tab);bottom:0;overflow:hidden;background:#080c12}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.right-axis{position:absolute;top:var(--tab);right:0;bottom:0;width:56px;background:linear-gradient(90deg,rgba(8,12,18,0),rgba(12,17,23,.72));pointer-events:none;z-index:4}.axis-label{position:absolute;right:0;height:18px;min-width:48px;padding:0 5px;display:flex;align-items:center;justify-content:flex-end;color:#a6b0b7}.axis-label.current{background:#c7545f;color:#fff;border-radius:2px 0 0 2px;font-weight:700}.axis-label.green{background:#2fc774;color:#eafcf2;border-radius:2px 0 0 2px;font-weight:700}.watermark{position:absolute;left:36px;bottom:42px;z-index:5;width:54px;height:24px;opacity:.98}.watermark:before,.watermark:after{content:'';position:absolute;background:#f6f8fa;transform:skewX(-32deg);height:11px;border-radius:1px}.watermark:before{width:21px;left:0;bottom:0}.watermark:after{width:31px;left:25px;bottom:7px}.split{position:absolute;inset:0;display:grid;grid-template-columns:53% 47%;gap:0;background:#080c12}.pane{position:relative;min-width:0;border-right:1px solid rgba(83,119,149,.35);overflow:hidden}.pane:last-child{border-right:0}.pane .stage{left:0;top:var(--tab)}.pane .chart-tabs{left:0}.pane .right-axis{top:var(--tab)}
.dom-panel{min-width:0;display:grid;grid-template-rows:24px 20px 22px 1fr;background:#0d1217;border-left:1px solid rgba(255,255,255,.07);overflow:hidden}.dom-tabs{height:24px;background:#151a1f;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 9px;gap:7px;font-weight:700}.dom-tabs .x{font-size:14px;color:#aab2b8}.dom-toolbar{height:20px;display:flex;align-items:center;gap:10px;padding:0 9px;background:#0e1419;color:#d3d8dc;font-weight:600}.gear{font-size:13px}.dom-head{height:22px;display:grid;grid-template-columns:38px 42px 42px 42px 48px 42px 48px;align-items:center;background:#0f151a;border-bottom:1px solid rgba(255,255,255,.07);color:#9fa9b1;font-weight:700}.dom-head div{padding:0 4px}.dom-head .center{text-align:center}.dom-head .right{text-align:right}.dom-body{position:relative;min-height:0;overflow:hidden;background:#0b1015}.book-grid{position:absolute;inset:0;display:grid;grid-template-columns:38px 42px 42px 42px 48px 42px 48px;align-content:start;z-index:2}.row{display:contents}.cell{height:var(--row);line-height:var(--row);position:relative;padding:0 4px;overflow:hidden;white-space:nowrap;color:#c8d1d7;border-bottom:1px solid rgba(255,255,255,.014);text-shadow:0 1px 0 rgba(0,0,0,.5)}.cell span{position:relative;z-index:2}.num{text-align:right}.vol,.sell,.buy,.delta{background:#0b1015}.price{background:#10171d;color:#d9e1e7;text-align:right;font-weight:700}.bid{background:rgba(16,43,31,.72)}.ask{background:rgba(57,25,29,.82)}.heat{position:absolute;top:1px;bottom:1px;min-width:2px;z-index:1}.heat.g{background:rgba(54,203,123,.88)}.heat.r{background:rgba(211,91,102,.88)}.heat.l{left:0}.heat.rr{right:0}.bid .heat{right:0;background:rgba(55,202,121,.48)}.ask .heat{left:0;background:rgba(213,84,96,.72)}.current-line{position:absolute;left:0;right:0;height:1px;background:rgba(235,238,241,.75);z-index:4;box-shadow:0 0 0 1px rgba(0,0,0,.25)}.dom-price-tag{position:absolute;left:0;height:16px;line-height:16px;padding:0 5px;background:#2ec979;color:white;font-weight:800;z-index:5}.dom-price-tag.red{background:#c7535f}.dom-vsep{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.05);z-index:3}.dom-vsep.a{left:38px}.dom-vsep.b{left:122px}.dom-vsep.c{left:164px}.dom-vsep.d{left:212px}.dom-vsep.e{left:254px}.dom-midshade{position:absolute;left:122px;width:132px;top:0;bottom:0;background:linear-gradient(90deg,rgba(34,104,65,.18),rgba(110,30,36,.2));z-index:0}.poc{display:inline-block;background:#33c77b;color:#fff;padding:0 4px;height:15px;line-height:15px;font-weight:800}.purple-label{color:#b365dc;font-weight:800}.cyan-label{color:#4abed2;font-weight:800}.status{height:var(--bottom);display:flex;align-items:center;background:#15191d;border-top:1px solid rgba(255,255,255,.075);color:#aeb6bd;gap:14px;padding:0 12px}.account{height:18px;display:inline-flex;align-items:center;padding:0 7px;background:rgba(219,132,55,.14);color:#f0a05b;border-left:1px solid rgba(219,132,55,.28);border-right:1px solid rgba(219,132,55,.2)}.net:before{content:'';display:inline-block;width:9px;height:9px;margin-right:6px;background:linear-gradient(135deg,transparent 48%,#41a07c 49%);border-left:1px solid rgba(65,160,124,.55)}.hidden{display:none!important}
@media (max-width:900px){:root{--dom:218px;--row:13px}.terminal{inset:6px}.top-item{padding:0 7px}.market{padding-left:10px}.dom-head,.book-grid{grid-template-columns:30px 32px 32px 34px 39px 34px 40px}.dom-vsep.a{left:30px}.dom-vsep.b{left:94px}.dom-vsep.c{left:128px}.dom-vsep.d{left:167px}.dom-vsep.e{left:201px}.dom-midshade{left:94px;width:107px}.shot-tip{display:none}.clock{font-size:10px}.left-tools{width:25px}:root{--tools:25px}.watermark{transform:scale(.72);transform-origin:left bottom}}
</style>
</head>
<body>
<main class="terminal">
<header class="topbar">

<script>
(() => {
const DPR=Math.max(1,Math.min(2,window.devicePixelRatio||1));
let view='dom';
const workspace=document.getElementById('workspace');
const domPanel=document.getElementById('domPanel');
const mainCanvas=document.getElementById('mainCanvas');
const ctx=mainCanvas.getContext('2d');
const axis=document.getElementById('axis');
const floatTools=document.getElementById('floatTools');
const bookGrid=document.getElementById('bookGrid');
const domBody=document.getElementById('domBody');
const domLine=document.getElementById('domLine');
const domTag=document.getElementById('domTag');
let seed=1968;
const rand=()=>((seed=(seed*1664525+1013904223)>>>0)/4294967296);
const lerp=(a,b,t)=>a+(b-a)*t;
function price(v){return Number(v).toFixed(1)}
function text(c,x,y,s,color='#b8c4cc',size=11,weight='500',align='left') {c.font=`${weight} ${size}px Inter,Segoe UI,Arial,sans-serif`;c.fillStyle=color;c.textAlign=align;c.textBaseline='middle';c.fillText(s,x,y)}
function line(c,x1,y1,x2,y2,color,w=1,dash=[]){c.save();c.strokeStyle=color;c.lineWidth=w;c.setLineDash(dash);c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.restore()}
function rect(c,x,y,w,h,color){c.fillStyle=color;c.fillRect(x,y,w,h)}
function clearAxis(){axis.innerHTML=''}
function addAxisLabel(y,val,cls=''){const d=document.createElement('div');d.className='axis-label '+cls;d.style.top=`${y}px`;d.textContent=val;axis.appendChild(d)}
function resize(){const r=mainCanvas.getBoundingClientRect();mainCanvas.width=Math.max(1,Math.floor(r.width*DPR));mainCanvas.height=Math.max(1,Math.floor(r.height*DPR));ctx.setTransform(DPR,0,0,DPR,0,0);draw();}
function candles(n,start,vol=1,bias=0){let a=[],p=start;for(let i=0;i<n;i++){let o=p;let impulse=(rand()-.5)*vol + bias; if(i%43===0) impulse+=(rand()-.5)*vol*5; let c=o+impulse; let h=Math.max(o,c)+rand()*vol*1.8;let l=Math.min(o,c)-rand()*vol*1.8;a.push({o,h,l,c});p=c}return a}
function drawCandle(c,x,y,o,h,l,cl,w){const up=cl>=o;const col=up?'#55d18c':'#d55b66';const wick=up?'rgba(94,205,137,.65)':'rgba(218,91,104,.62)';c.strokeStyle=wick;c.lineWidth=1; c.beginPath();c.moveTo(x+w/2,h);c.lineTo(x+w/2,l);c.stroke();rect(c,x,Math.min(o,cl),w,Math.max(1.5,Math.abs(cl-o)),col)}
function mapPrice(p,min,max,top,bottom){return bottom-(p-min)/(max-min)*(bottom-top)}
function drawHeaderOHLC(c,o,h,l,cl,label='OHLC'){text(c,10,17,'✥', '#d9e1e7',16,'600');text(c,28,17,`${label}   O${price(o)} H${price(h)} L${price(l)} C${price(cl)}`,'#c7d0d7',11,'600')}
function drawGrid(c,w,h,prices,current){const left=0,right=w-56,top=0,bottom=h-26;for(let i=0;i<7;i++){const y=lerp(top+54,bottom-45,i/6);line(c,left,y,right,y,'rgba(132,149,162,.11)',1)}for(let i=0;i<16;i++){const x=lerp(left+60,right-40,i/15);line(c,x,top,x,bottom,'rgba(132,149,162,.035)',1)}prices.forEach(([p,label])=>{const y=mapPrice(p,prices[0][0]-1000,prices[prices.length-1][0]+1000,top,bottom);line(c,left,y,right,y,'rgba(173,184,194,.38)',1,[5,4]);text(c,right-10,y-7,label,'#87929b',10,'600','right')});const cy=mapPrice(current,61000,63250,top,bottom);line(c,left,cy,right,cy,'rgba(198,73,86,.65)',1,[2,2]);}
function drawBandView(){clearAxis();floatTools.classList.remove('on');const w=mainCanvas.clientWidth,h=mainCanvas.clientHeight;ctx.clearRect(0,0,w,h);rect(ctx,0,0,w,h,'#080c12');const chartH=Math.floor(h*.72),cvdTop=chartH+10;drawHeaderOHLC(ctx,61483.7,63786.7,61483.0,63484.0);const left=14,right=w-70,top=34,bottom=chartH-8;for(let i=0;i<6;i++){line(ctx,0,lerp(top,bottom,i/5),right,'rgba(124,144,159,.09)',1)}for(let i=0;i<8;i++){line(ctx,lerp(0,right,i/7),top,lerp(0,right,i/7),bottom,'rgba(124,144,159,.035)',1)}
// blue bands
const x0=58,x1=right-70;ctx.save();ctx.beginPath();for(let i=0;i<220;i++){const x=lerp(x0,x1,i/219);const t=i/219;const y=lerp(72,bottom-88,t)+Math.sin(t*9)*12; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}for(let i=219;i>=0;i--){const x=lerp(x0,x1,i/219);const t=i/219;const y=lerp(292,bottom-8,t)+Math.sin(t*8+1)*16;ctx.lineTo(x,y)}ctx.closePath();ctx.fillStyle='rgba(28,54,77,.68)';ctx.fill();ctx.strokeStyle='rgba(54,107,151,.32)';ctx.stroke();ctx.restore();
ctx.save();ctx.beginPath();for(let i=0;i<220;i++){const x=lerp(x0,x1,i/219);const t=i/219;const y=lerp(114,bottom-146,t)+Math.sin(t*8)*9; if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}for(let i=219;i>=0;i--){const x=lerp(x0,x1,i/219);const t=i/219;const y=lerp(236,bottom-45,t)+Math.sin(t*10+1)*11;ctx.lineTo(x,y)}ctx.closePath();ctx.fillStyle='rgba(36,86,126,.33)';ctx.fill();ctx.strokeStyle='rgba(68,132,183,.32)';ctx.stroke();ctx.restore();
line(ctx,x0,170,x1,bottom-122,'rgba(62,132,209,.78)',1.5);line(ctx,0,Math.floor(bottom*.58),right,'rgba(55,180,111,.22)',1);line(ctx,0,Math.floor(bottom*.39),right,'rgba(195,82,95,.35)',1,[2,2]);

<!-- ============ CHART / TRADING PAGE ============ -->
<section class="page" data-page="chart">
  <div class="chart-layout">
    <!-- Top bar: pair selector + timeframes + price -->
    <div class="chart-topbar">
      <div class="chart-topbar-left">
        <div class="chart-pair-selector" id="chartPair">
          <button class="chart-pair-btn active" data-symbol="BTCUSDT">BTC/USDT</button>
          <button class="chart-pair-btn" data-symbol="ETHUSDT">ETH/USDT</button>
        </div>
        <div class="chart-price-info" id="chartPriceInfo">
          <span class="chart-price" id="chartPrice">—</span>
          <span class="chart-change" id="chartChange"></span>
        </div>
      </div>
      <div class="chart-topbar-right">
        <div class="chart-timeframes">
          <button class="chart-tf-btn" data-interval="5m">5m</button>
          <button class="chart-tf-btn" data-interval="15m">15m</button>
          <button class="chart-tf-btn" data-interval="30m">30m</button>
          <button class="chart-tf-btn active" data-interval="1h">1H</button>
          <button class="chart-tf-btn" data-interval="4h">4H</button>
          <button class="chart-tf-btn" data-interval="1d">1D</button>
          <button class="chart-tf-btn" data-interval="1w">1W</button>
        </div>
        <span class="chart-countdown" id="chartCountdown"></span>
      </div>
    </div>

    <!-- Chart area -->
    <div class="chart-main">
      <div class="chart-canvas-wrap" id="chartCanvasWrap">
        <div id="chartCanvas"></div>
      </div>
    </div>

    <!-- Bottom bar: stats rapides -->
    <div class="chart-bottombar" id="chartBottomBar">
      <span><strong>O</strong> <span id="chartOpen">—</span></span>
      <span><strong>H</strong> <span id="chartHigh">—</span></span>
      <span><strong>L</strong> <span id="chartLow">—</span></span>
      <span><strong>C</strong> <span id="chartClose">—</span></span>
      <span><strong>Vol</strong> <span id="chartVol">—</span></span>
    </div>
  </div>
</section>

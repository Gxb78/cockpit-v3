        <div class="panel card-surface card-surface--sm settings-panel">
          <div class="panel-h"><h3>Preferences</h3></div>
          <p class="settings-help">Personnalise l'apparence et le comportement.</p>
          <label class="settings-switch">
            <input type="checkbox" id="prefAnimations" />
            <span>Animations</span>
          </label>
          <label class="settings-switch">
            <input type="checkbox" id="prefDarkMode" />
            <span>Dark mode</span>
          </label>

            <label for="prefTheme">Theme</label>
            <div class="select-wrapper">
              <select id="prefTheme">
                <option value="default">Classic (cyan)</option>
                <option value="claude">Claude Warm (terracotta)</option>
              </select>
              <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          <div class="settings-actions">
            <button type="button" class="btn-primary" id="settingsSavePrefsBtn">Appliquer</button>
          </div>
        </div>

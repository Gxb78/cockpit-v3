<!-- Journal header: navigation, stats, month picker, toggles -->
<h1 class="page-title sr-only">Journal</h1>
<div class="journal-page-head">
  <div class="journal-top-bar unified">
    <!-- Left: Period stats + month nav inline -->
    <div class="journal-head-stats">
      <span class="stat" id="jhsWr">WR --</span>
      <span class="stat" id="jhsPnl">PnL --</span>
      <span class="stat" id="jhsTr">TR --</span>
      <span class="stat" id="jhsAvg">Moy --</span>
    </div>

    <!-- Center: Navigation compacte (prev / month input / next / today) -->
    <div class="journal-nav-inline">
      <button type="button" class="btn-icon" id="prevMonth" aria-label="Mois pr&eacute;c&eacute;dent">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="journal-month-control" id="journalMonthInputWrap">
        <input type="month" id="journalMonthInput" aria-label="Choisir un mois">
      </div>
      <button type="button" class="btn-icon" id="nextMonth" aria-label="Mois suivant">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button type="button" class="journal-today-btn" id="todayJumpBtn">Aujourd&rsquo;hui</button>
    </div>

    <!-- Right: Toggles compacts (focus / view / layout / range) -->
    <div class="journal-head-right">

      <!-- Calendar focus mode (WR/PnL/Tr) -->
      <div id="calendarMonthFocus" data-mode="winrate">
        <div id="calendarMonthFocusToggle">
          <button type="button" class="calendar-month-focus-btn" data-mode="winrate">WR</button>
          <button type="button" class="calendar-month-focus-btn" data-mode="pnl">PnL</button>
          <button type="button" class="calendar-month-focus-btn" data-mode="trades">Tr</button>
        </div>
      </div>

      <span class="journal-filters-sep"></span>

      <!-- View / Layout / Range compacts -->
      <div class="calendar-view-toggle" id="calendarViewToggle">
        <button type="button" class="calendar-view-btn active" data-mode="month">Mois</button>
        <button type="button" class="calendar-view-btn" data-mode="week">Semaine</button>
      </div>

      <div class="calendar-layout-toggle" id="calendarLayoutToggle">
        <button type="button" class="calendar-layout-btn active" data-mode="calendar">Calendrier</button>
        <button type="button" class="calendar-layout-btn" data-mode="table">Table</button>
      </div>

      <div class="calendar-range-toggle" id="calendarRangeToggle">
        <button type="button" class="calendar-range-btn active" data-mode="month">Mois</button>
        <button type="button" class="calendar-range-btn" data-mode="quarter">Trimestre</button>
        <button type="button" class="calendar-range-btn" data-mode="custom">Custom</button>
      </div>

      <!-- Quick range presets -->
      <div id="calendarQuickRange" class="hidden" style="display:none;">
        <button type="button" class="calendar-quick-btn" data-days="7">7j</button>
        <button type="button" class="calendar-quick-btn" data-days="30">30j</button>
        <button type="button" class="calendar-quick-btn" data-days="90">90j</button>
      </div>

      <!-- Custom range label -->
      <div id="calendarCustomRange" class="hidden" style="display:none;">
        <span id="calendarCustomLabel">-</span>
      </div>
    </div>
  </div>

  <!-- Month picker popover (hidden by default) -->
  <div class="calendar-month-picker" id="calendarMonthPicker">
      <h2 id="monthLabel">Mois</h2>
    <div class="month-pop hidden" id="monthPopover">
      <div class="month-pop-head">
        <button type="button" class="month-year-btn btn-icon" id="monthYearPrev" aria-label="Ann&eacute;e pr&eacute;c&eacute;dente">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="month-pop-year" id="monthPickerYear">2025</span>
        <button type="button" class="month-year-btn btn-icon" id="monthYearNext" aria-label="Ann&eacute;e suivante">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="month-grid" id="monthGrid">
        <button type="button" class="month-btn" data-month="0">Jan</button>
        <button type="button" class="month-btn" data-month="1">F&eacute;v</button>
        <button type="button" class="month-btn" data-month="2">Mar</button>
        <button type="button" class="month-btn" data-month="3">Avr</button>
        <button type="button" class="month-btn" data-month="4">Mai</button>
        <button type="button" class="month-btn" data-month="5">Juin</button>
        <button type="button" class="month-btn" data-month="6">Juil</button>
        <button type="button" class="month-btn" data-month="7">Ao&ucirc;t</button>
        <button type="button" class="month-btn" data-month="8">Sep</button>
        <button type="button" class="month-btn" data-month="9">Oct</button>
        <button type="button" class="month-btn" data-month="10">Nov</button>
        <button type="button" class="month-btn" data-month="11">D&eacute;c</button>
      </div>
    </div>
  </div>
</div>

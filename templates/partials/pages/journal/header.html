<!-- Journal header: navigation, month, toggles -->
<h1 class="page-title sr-only">Journal</h1>
<div class="journal-page-head">
  <!-- Navigation compacte (prev / month input / next / today) -->
  <div class="journal-nav-inline">
    <button type="button" class="btn-icon" id="prevMonth" aria-label="Mois pr&eacute;c&eacute;dent">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="journal-month-control" id="journalMonthInputWrap">
      <input type="month" id="journalMonthInput" aria-label="Choisir un mois">
    </div>
    <button type="button" class="btn-icon" id="nextMonth" aria-label="Mois suivant">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button type="button" class="journal-today-btn" id="todayJumpBtn">Aujourd&rsquo;hui</button>
  </div>

  <!-- Toggles compacts (view / layout / range) -->
  <div class="journal-head-right">
    <div class="calendar-view-toggle" id="calendarViewToggle">
      <button type="button" class="calendar-view-btn active" data-mode="month">Mois</button>
      <button type="button" class="calendar-view-btn" data-mode="week">Semaine</button>
    </div>
    <div class="calendar-layout-toggle" id="calendarLayoutToggle">
      <button type="button" class="calendar-layout-btn active" data-mode="calendar">Calendrier</button>
      <button type="button" class="calendar-layout-btn" data-mode="table">Table</button>
    </div>
    <div class="calendar-range-toggle" id="calendarRangeToggle">
      <button type="button" class="calendar-range-btn active" data-mode="month">Mois</button>
      <button type="button" class="calendar-range-btn" data-mode="quarter">Trimestre</button>
      <button type="button" class="calendar-range-btn" data-mode="custom">Custom</button>
    </div>
    <div id="calendarQuickRange" class="hidden">
      <button type="button" class="calendar-quick-btn" data-days="7">7j</button>
      <button type="button" class="calendar-quick-btn" data-days="30">30j</button>
      <button type="button" class="calendar-quick-btn" data-days="90">90j</button>
    </div>
    <div id="calendarCustomRange" class="hidden">
      <span id="calendarCustomLabel">-</span>
    </div>
    <button type="button" class="btn-icon journal-night-btn" id="journalNightToggle" aria-label="Mode nuit">&#9790;</button>
  </div>
</div>

      <div class="journal-table-wrap card-surface card-surface--xs hidden" id="journalTableWrap">
        <div class="journal-table-head">
          <h3>Tableau des trades</h3>
          <div class="journal-table-stats">
            <span class="stat" id="jhsWr">WR --</span>
            <span class="stat" id="jhsPnl">PnL --</span>
            <span class="stat" id="jhsTr">TR --</span>
            <span class="stat" id="jhsAvg">Moy --</span>
          </div>
          <div class="journal-table-meta mono" id="journalTableCount">0 trade</div>
        </div>
        <div class="journal-table-scroll">
          <table class="journal-trades-table">
            <thead>
              <tr>
                <th><button type="button" class="journal-sort-btn" data-sort-key="date">Date</button></th>
                <th><button type="button" class="journal-sort-btn" data-sort-key="instrument">Instrument</button></th>
                <th><button type="button" class="journal-sort-btn" data-sort-key="strategy">Strategie</button></th>
                <th><button type="button" class="journal-sort-btn" data-sort-key="direction">Dir</button></th>
                <th><button type="button" class="journal-sort-btn" data-sort-key="entry_price">Entry</button></th>
                <th><button type="button" class="journal-sort-btn" data-sort-key="exit_price">TP</button></th>
                <th><button type="button" class="journal-sort-btn" data-sort-key="rr">RR</button></th>
                <th><button type="button" class="journal-sort-btn" data-sort-key="pnl">PnL</button></th>
                <th><button type="button" class="journal-sort-btn" data-sort-key="result">Resultat</button></th>
              </tr>
            </thead>
            <tbody id="journalTradesTbody"></tbody>
          </table>
        </div>
        <div class="journal-table-empty hidden" id="journalTableEmpty">
        Aucun trade avec ces filtres.
        <div class="empty-cta" style="margin-top:8px"><button type="button" class="btn-ghost" onclick="resetJournalFilters()">Réinitialiser les filtres</button></div>
      </div>
      </div>

        <section class="panel widget widget-panel today-context-widget" data-widget-key="today_context" data-widget-kind="panel" data-size="md">
          <!-- Empty state : aucun jour pour aujourd'hui -->
          <div class="today-context-empty" id="todayContextEmpty">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <div>Aucun contexte aujourd'hui.</div>
              <div class="empty-cta">
                <button type="button" class="btn-ghost" id="todayContextCreateBtn">Creer un contexte</button>
              </div>
            </div>
          </div>

          <!-- Formulaire contexte jour -->
          <form id="dayForm" class="today-context-form">
            <input type="hidden" id="dayId" />

            <!-- Header : date + instrument inline -->
            <div class="tc-head">
              <div class="tc-instr-wrap">
                <select id="entryInstrument" class="tc-instr-select" required>
                  <option value="">Instrument</option>
                </select>
              </div>
              <input type="date" id="entryDate" class="tc-date-input" required />
              <span class="tc-autosave" id="autosaveInd" data-state="idle">
                <span id="autosaveText">Auto-save</span>
              </span>
            </div>

            <!-- Bias pills inline -->
            <div class="tc-bias">
              <div class="pills tc-bias-pills" data-pills="htf_bias">
                <button type="button" class="pill-choice lime" data-value="bullish">Bullish</button>
                <button type="button" class="pill-choice rose" data-value="bearish">Bearish</button>
                <button type="button" class="pill-choice" data-value="neutral">Neutral</button>
              </div>
            </div>

            <!-- Textareas -->
            <textarea id="htfContext" rows="2" placeholder="Analyse HTF — structure, niveaux clés…"></textarea>
            <textarea id="dailyNotes" rows="2" placeholder="Notes du jour — macro, contexte, préparation…"></textarea>
          </form>
        </section>

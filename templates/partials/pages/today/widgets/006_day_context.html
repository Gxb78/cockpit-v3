        <section class="panel widget widget-panel today-context-widget" data-widget-key="today_context" data-widget-kind="panel" data-size="md">
          <form id="dayForm" class="today-context-form">
            <input type="hidden" id="dayId" />

            <!-- Header : date + instrument + autosave indicator -->
            <div class="tc-header">
              <div class="tc-header-left">
                <div class="tc-field tc-date">
                  <input type="date" id="entryDate" required />
                </div>
                <div class="tc-field tc-instrument">
                  <div class="select-wrapper">
                    <select id="entryInstrument" required>
                      <option value="">Instrument</option>
                    </select>
                    <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                  </div>
                </div>
              </div>
              <div class="tc-header-right">
                <span id="autosaveInd" data-state="idle">
                  <span id="autosaveText" class="tc-autosave-text">Auto-save</span>
                  <span class="tc-autosave-dot"></span>
                </span>
              </div>
            </div>

            <!-- Body : bias row + notes -->
            <div class="tc-body">
              <div class="tc-bias-row">
                <label class="tc-bias-label">Biais</label>
                <div class="pills tc-bias-pills" data-pills="htf_bias">
                  <button type="button" class="pill-choice lime" data-value="bullish">Bullish</button>
                  <button type="button" class="pill-choice rose" data-value="bearish">Bearish</button>
                  <button type="button" class="pill-choice" data-value="neutral">Neutral</button>
                </div>
              </div>

              <div class="tc-notes">
                <textarea id="htfContext" rows="2" placeholder="Analyse HTF — structure, niveaux clés…"></textarea>
                <textarea id="dailyNotes" rows="2" placeholder="Notes du jour — macro, prépa…"></textarea>
              </div>
            </div>

          </form>
        </section>

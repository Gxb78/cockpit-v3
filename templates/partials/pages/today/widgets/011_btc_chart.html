<section class="panel widget widget-panel btc-chart-widget" data-widget-key="btc_chart" data-widget-kind="panel" data-size="xl">
  <div class="panel-h">
    <h3>BTC/USDT <span class="btc-chart-price" id="btcChartPrice">—</span></h3>
    <div class="btc-chart-controls">
      <button type="button" class="btn-icon btc-chart-interval active" data-interval="3m">3m</button>
      <button type="button" class="btn-icon btc-chart-interval" data-interval="5m">5m</button>
      <button type="button" class="btn-icon btc-chart-interval" data-interval="15m">15m</button>
      <button type="button" class="btn-icon btc-chart-interval" data-interval="30m">30m</button>
      <button type="button" class="btn-icon btc-chart-interval" data-interval="1h">1H</button>
      <button type="button" class="btn-icon btc-chart-interval" data-interval="4h">4H</button>
      <button type="button" class="btn-icon btc-chart-interval" data-interval="1d">1D</button>
      <input type="text" class="btc-chart-custom" id="btcChartCustom" placeholder="Custom" maxlength="4" title="Intervalle custom (ex: 2h, 15m, 3d)">
    </div>
  </div>
  <div class="btc-chart-container" id="btcChartContainer"></div>
</section>

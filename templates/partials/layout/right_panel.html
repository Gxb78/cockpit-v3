<aside class="side-right" id="aiPanel" aria-label="Assistant panel">
  <div class="side-right-head">
    <h3>Assistant</h3>
    <div class="side-right-head-actions">
      <button type="button" class="ai-chat-clear-btn" id="aiChatClear" title="Nouvelle conversation" aria-label="Nouvelle conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="side-right-body">
    <div class="ai-chat" id="aiChat" data-name="Chat IA">
      <div class="ai-chat-messages" id="aiChatMessages"></div>
      <div class="ai-chat-input-area">
        <textarea
          class="ai-chat-input"
          id="aiChatInput"
          rows="2"
          placeholder="Pose une question a l'assistant..."
          autocomplete="off"
        ></textarea>
        <button class="ai-chat-send" id="aiChatSend" aria-label="Envoyer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
        <label class="ai-chat-img-btn" id="aiChatImgLabel" aria-label="Ajouter une image" title="Ajouter une image (Ctrl+V)">
          <input type="file" id="aiChatImgInput" accept="image/png,image/jpeg,image/gif,image/webp" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </label>
      </div>
      <div class="ai-chat-img-preview" id="aiChatImgPreview" hidden></div>
    </div>
  </div>
</aside>
<button
  type="button"
  class="ai-panel-handle"
  id="aiPanelToggle"
  aria-expanded="false"
  aria-controls="aiPanel"
  aria-label="Ouvrir ou fermer le panneau Assistant"
  title="Assistant"
>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
  </svg>
</button>

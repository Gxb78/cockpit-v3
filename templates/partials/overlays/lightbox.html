<!-- Lightbox -->
<div class="lightbox hidden" id="lightbox" data-name="Lightbox" role="dialog" aria-modal="true" aria-label="Apercu du screenshot">
  <button class="lightbox-close" id="lightboxClose" aria-label="Fermer l apercu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <img id="lightboxImg" alt="Screenshot de trade" />
</div>

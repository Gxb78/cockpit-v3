<!-- ===================== WIZARD — Ajouter un trade ===================== -->
<div class="wiz hidden" id="wiz" role="dialog" aria-modal="true" aria-label="Ajouter un trade" data-name="Wizard">
  <div class="wiz-panel">
    <div class="wiz-progress"><div class="wiz-progress-fill" id="wizProgressFill"></div></div>
    <div class="wiz-header">
      <button class="wiz-btn-icon" id="wizBackBtn" aria-label="Etape precedente">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <div class="wiz-header-center">
        <div class="wiz-step-indicator" id="wizStepIndicator">1 / 11</div>
        <div class="wiz-step-title" id="wizStepTitle"></div>
      </div>
      <button class="wiz-btn-icon" id="wizCloseBtn" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="wiz-body" id="wizBody"></div>
    <div class="wiz-footer" id="wizFooter">
      <button type="button" class="wiz-next-btn btn-primary" id="wizNextBtn">
        Suivant
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </div>
</div>

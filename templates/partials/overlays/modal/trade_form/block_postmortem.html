            <!-- POST-MORTEM -->
            <div class="block" data-bid="postmortem">
              <div class="block-h amber">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span>
                <span>Post-mortem</span>
                <span class="block-h-spacer"></span>
                <span class="block-summary" id="pmSummary"></span>
                <span class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
              </div>
              <div class="block-body">
                <div class="pm-grid">
                  <div class="field">
                    <label>Thèse validée ?</label>
                    <div class="pills" data-pills="thesis_validated">
                      <button type="button" class="pill-choice lime" data-value="yes">Oui</button>
                      <button type="button" class="pill-choice amber" data-value="partial">Partiel</button>
                      <button type="button" class="pill-choice rose" data-value="no">Non</button>
                    </div>
                  </div>
                  <div class="field">
                    <label>Qualité d'exécution</label>
                    <div class="quality" id="qualityRating">
                      <button type="button" data-q="1" title="1/5"><svg viewBox="0 0 24 24"><polygon points="12 2 15 8.5 22 9.3 17 14 18 21 12 17.8 6 21 7 14 2 9.3 9 8.5"/></svg></button>
                      <button type="button" data-q="2" title="2/5"><svg viewBox="0 0 24 24"><polygon points="12 2 15 8.5 22 9.3 17 14 18 21 12 17.8 6 21 7 14 2 9.3 9 8.5"/></svg></button>
                      <button type="button" data-q="3" title="3/5"><svg viewBox="0 0 24 24"><polygon points="12 2 15 8.5 22 9.3 17 14 18 21 12 17.8 6 21 7 14 2 9.3 9 8.5"/></svg></button>
                      <button type="button" data-q="4" title="4/5"><svg viewBox="0 0 24 24"><polygon points="12 2 15 8.5 22 9.3 17 14 18 21 12 17.8 6 21 7 14 2 9.3 9 8.5"/></svg></button>
                      <button type="button" data-q="5" title="5/5"><svg viewBox="0 0 24 24"><polygon points="12 2 15 8.5 22 9.3 17 14 18 21 12 17.8 6 21 7 14 2 9.3 9 8.5"/></svg></button>
                    </div>
                    <input type="hidden" id="executionQuality" />
                  </div>

                </div>
                <div class="field">
                  <label>Leçons retenues</label>
                  <textarea id="lessonsLearned" rows="2" placeholder="Ce que je note pour la prochaine fois…"></textarea>
                </div>
                <div class="field">
                  <label>Tags</label>
                  <div class="tags-input" id="tagsInput">
                    <input type="text" id="tagsInputField" placeholder="FVG, OB, liquidity… puis Entrée" />
                  </div>
                </div>
              </div>
            </div>

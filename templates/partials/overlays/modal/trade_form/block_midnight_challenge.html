            <!-- PLAN PO3 / MIDNIGHT -->
            <div class="block midnight-coach" id="midnightCoachBlock" data-bid="midnight-coach">
              <div class="block-h cyan">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l7 4v5c0 5-3 8-7 9-4-1-7-4-7-9V7l7-4z"/><path d="M9 12l2 2 4-4"/></svg></span>
                <span>Plan PO3</span>
                <span class="block-h-spacer"></span>
                <span class="block-summary" id="coachSummary"></span>
                <span class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
              </div>
              <div class="block-body">
                <div class="midnight-coach-intro">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                  Definis le plan avant de choisir la direction executee.
                </div>
                <div class="midnight-coach-status" id="midnightCoachStatus"></div>
                <div class="midnight-coach-next" id="midnightCoachNextQuestion"></div>
                <div class="plan-rule-card" id="po3RuleCard">
                  <span>Logique PO3</span>
                  <strong id="po3RuleText">Open haussier = chercher short. Open baissier = chercher long.</strong>
                </div>
                <div class="midnight-coach-grid">
                  <div class="field">
                    <label>1) Avant open</label>
                    <div class="select-wrapper">
                      <select id="mmPreOpen">
                        <option value="">-</option>
                        <option value="up">Prix monte avant open</option>
                        <option value="down">Prix baisse avant open</option>
                        <option value="range">Range / neutre avant open</option>
                      </select>
                      <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                  </div>
                  <div class="field">
                    <label>2) Reaction a l'open</label>
                    <div class="select-wrapper">
                      <select id="mmOpenBehavior">
                        <option value="">-</option>
                        <option value="drop">Open baissier (creation du low)</option>
                        <option value="rise">Open haussier (creation du high)</option>
                        <option value="chop">Open indecis / chop</option>
                      </select>
                      <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                  </div>
                  <div class="field">
                    <label>3) PO3 valide ?</label>
                    <div class="select-wrapper">
                      <select id="mmPo3State">
                        <option value="">-</option>
                        <option value="yes">Oui</option>
                        <option value="partial">Partiel / en cours</option>
                        <option value="no">Non</option>
                      </select>
                      <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                  </div>
                  <div class="field">
                    <label>4) Trigger d'entree</label>
                    <div class="select-wrapper">
                      <select id="mmEntryTrigger">
                        <option value="">-</option>
                        <option value="ifvg">IFVG</option>
                        <option value="breaker">Breaker block</option>
                        <option value="both">IFVG + Breaker</option>
                      </select>
                      <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                  </div>
                  <div class="field">
                    <label>5) Zone d'entree (50%)</label>
                    <div class="select-wrapper">
                      <select id="mmZoneRule">
                        <option value="">-</option>
                        <option value="discount">Discount (&lt; 50%)</option>
                        <option value="premium">Premium (&gt; 50%)</option>
                        <option value="invalid">Hors regle</option>
                      </select>
                      <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                  </div>
                  <div class="field">
                    <label>6) SMT au contact du STDV</label>
                    <div class="select-wrapper">
                      <select id="mmSmtState">
                        <option value="">-</option>
                        <option value="bullish">SMT haussiere</option>
                        <option value="bearish">SMT baissiere</option>
                        <option value="none">Aucune SMT</option>
                      </select>
                      <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                  </div>
                  <div class="field">
                    <label>7) Liquidite ciblee</label>
                    <div class="select-wrapper">
                      <select id="mmLiquidityTarget">
                        <option value="">-</option>
                        <option value="above">Au-dessus</option>
                        <option value="below">En dessous</option>
                        <option value="both">Les deux / scaling</option>
                      </select>
                      <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                  </div>
                  <div class="field">
                    <label>8) Contre-these</label>
                    <textarea id="mmCounterThesis" rows="2" placeholder="Quel signal invaliderait ton idee ?"></textarea>
                  </div>
                </div>
                <ul class="midnight-coach-list" id="midnightCoachChecklist"></ul>
              </div>
            </div>

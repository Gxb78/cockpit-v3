            <!-- SCREENSHOTS -->
            <div class="block" data-bid="screenshots">
              <div class="block-h">
                <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></span>
                <span>Screenshots</span>
                <span class="block-h-spacer"></span>
                <span class="block-summary" id="shotsSummary"></span>
                <span class="chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
              </div>
              <div class="block-body">
                <div class="shots-area">
                  <div id="shotsList" class="shots-list"></div>
                  <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" accept="image/*" multiple hidden />
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <p>Glisse des images ici ou clique pour choisir</p>
                    <small>Ctrl+V depuis n'importe quel champ</small>
                  </div>
                </div>
              </div>
            </div>

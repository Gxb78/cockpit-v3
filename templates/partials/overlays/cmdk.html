<!-- ===================== COMMAND PALETTE ===================== -->
<div class="cmdk hidden" id="cmdk" data-name="Palette Cmd+K" role="dialog" aria-modal="true" aria-label="Palette de commandes">
  <div class="cmdk-box">
    <div class="cmdk-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="cmdk-input" id="cmdkInput" type="text" placeholder="Cherche une entree, navigue, execute..." autocomplete="off" />
    </div>
    <div class="cmdk-results" id="cmdkResults"></div>
    <div class="cmdk-foot">
      <span><span class="kbd-key">up</span><span class="kbd-key">down</span> naviguer</span>
      <span><span class="kbd-key">enter</span> ouvrir</span>
      <span><span class="kbd-key">esc</span> fermer</span>
    </div>
  </div>
</div>
